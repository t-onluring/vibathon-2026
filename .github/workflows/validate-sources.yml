name: Validate Source Registry

on:
  pull_request:
    paths:
      - "data/sources.json"
      - "scripts/validate-sources.mjs"
      - ".github/workflows/validate-sources.yml"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run source validator
        run: node scripts/validate-sources.mjs
